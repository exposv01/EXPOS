<section class="expos-section" data-expos-page="absensi" hidden>
  <div class="expos-stack">
    <div class="expos-card expos-card-lg">
      <button class="expos-button expos-button-secondary" type="button" data-expos-back>← Kembali</button>
      <h1 class="expos-title" style="margin-top:16px;">Absensi</h1>
      <p class="expos-muted" style="margin-bottom:0;">Catat kehadiran masuk dan pulang harian karyawan.</p>
    </div>

    <form class="expos-card expos-stack" id="absensiForm">
      <div>
        <label class="expos-label" for="absensiCabang">Cabang</label>
        <select class="expos-select" id="absensiCabang" name="cabang" required>
          <option value="">Pilih cabang</option>
          <option value="CBN">EXP Gaming Cibinong</option>
          <option value="ARH">EXP Gaming Ar Hakim</option>
          <option value="SLW">EXP Gaming Siliwangi</option>
        </select>
      </div>

      <div>
        <label class="expos-label" for="absensiKaryawan">ID Karyawan</label>
        <input class="expos-input" id="absensiKaryawan" name="idKaryawan" placeholder="Contoh: CBN-001" required>
      </div>

      <div>
        <label class="expos-label" for="jenisAbsensi">Jenis Absensi</label>
        <select class="expos-select" id="jenisAbsensi" name="jenisAbsensi" required>
          <option value="">Pilih jenis absensi</option>
          <option value="Masuk">Masuk</option>
          <option value="Pulang">Pulang</option>
        </select>
      </div>

      <button class="expos-button" type="submit" id="absensiSubmitButton">Kirim Absensi</button>
    </form>
  </div>
</section>

<script>
  function exposShowAbsensiSnackbar(message) {
    var snackbar = document.createElement('div');
    snackbar.className = 'expos-snackbar';
    snackbar.textContent = message;
    document.body.appendChild(snackbar);

    setTimeout(function() {
      snackbar.remove();
    }, 2400);
  }

  function exposBindAbsensiForm() {
    var form = document.getElementById('absensiForm');
    var button = document.getElementById('absensiSubmitButton');

    if (!form || !button) {
      return;
    }

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      var payload = {
        cabang: form.cabang.value,
        idKaryawan: form.idKaryawan.value,
        jenisAbsensi: form.jenisAbsensi.value
      };

      button.disabled = true;
      button.textContent = 'Mengirim...';

      google.script.run
        .withSuccessHandler(function() {
          form.reset();
          button.disabled = false;
          button.textContent = 'Kirim Absensi';
          exposShowAbsensiSnackbar('Absensi berhasil dikirim ✅');
        })
        .withFailureHandler(function(error) {
          button.disabled = false;
          button.textContent = 'Kirim Absensi';
          exposShowAbsensiSnackbar(error.message || 'Absensi gagal dikirim');
        })
        .createAbsensi(payload);
    });
  }

  document.addEventListener('DOMContentLoaded', exposBindAbsensiForm);
</script>
