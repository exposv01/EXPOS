<!DOCTYPE html><html lang="id"><head><base target="_top"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>EXPOS - Absensi</title><style>body{margin:0;background:#f4f7fb;color:#172033;font-family:Arial,sans-serif}.app{max-width:390px;min-height:100vh;margin:0 auto}.top{background:#0f3d73;color:#fff;padding:28px 16px 38px;border-bottom-left-radius:28px;border-bottom-right-radius:28px;display:flex;gap:12px}.back{width:40px;height:40px;border:0;border-radius:14px;background:rgba(255,255,255,.15);color:#fff;font-size:22px}.card{margin:-24px 14px 14px;background:#fff;border:1px solid #e5eaf2;border-radius:22px;padding:14px;box-shadow:0 12px 30px rgba(15,61,115,.08)}label{display:block;margin:12px 0 6px;font-size:12px;font-weight:700}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #e5eaf2;border-radius:14px;padding:12px;font-size:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:calc(100% - 28px);max-width:362px;min-height:52px;border:0;border-radius:18px;background:#16a34a;color:#fff;font-weight:900}.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:#172033;color:#fff;padding:12px;border-radius:16px;display:none;width:calc(100% - 42px);max-width:348px;font-size:13px}.toast.on{display:block}@media(max-width:340px){.row{grid-template-columns:1fr}}</style></head><body><main class="app"><header class="top"><button class="back" onclick="go('home')">‹</button><div><h1>Absensi</h1><p>Check in / check out</p></div></header><section class="card"><form id="form"><label>Tipe</label><select name="attendanceType"><option value="CHECK_IN">Masuk</option><option value="CHECK_OUT">Pulang</option></select><div class="row"><div><label>Cabang</label><select name="branch"><option value="">Pilih</option><option>CBN</option><option>ARH</option><option>SLW</option></select></div><div><label>Shift</label><select name="shift"><option>Shift 1</option><option>Shift 2</option><option>Middle</option><option>Full Day</option></select></div></div><label>Nama Karyawan</label><input name="employeeName" placeholder="Sesuai Master Karyawan"><label>Catatan</label><textarea name="note"></textarea></form></section><button id="btn" class="btn" onclick="send()">Submit Absensi</button></main><div id="toast" class="toast"></div><script>function go(p){location.href=location.href.split('?')[0]+'?page='+encodeURIComponent(p)}function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2600)}function val(){var d=new FormData(document.getElementById('form'));return{attendanceType:d.get('attendanceType'),branch:(d.get('branch')||'').trim(),shift:(d.get('shift')||'').trim(),employeeName:(d.get('employeeName')||'').trim(),note:(d.get('note')||'').trim(),hasPhoto:false,clientTimestamp:new Date().toISOString()}}function send(){var p=val();if(!p.branch)return toast('Cabang wajib dipilih.');if(!p.shift)return toast('Shift wajib dipilih.');if(!p.employeeName)return toast('Nama wajib diisi.');btn.disabled=true;btn.textContent='Mengirim...';google.script.run.withSuccessHandler(function(){btn.disabled=false;btn.textContent='Submit Absensi';document.getElementById('form').reset();toast('Absensi berhasil dikirim.')}).withFailureHandler(function(e){btn.disabled=false;btn.textContent='Submit Absensi';toast(e&&e.message?e.message:'Gagal dikirim.')}).submitAttendance(p)}</script></body></html>
