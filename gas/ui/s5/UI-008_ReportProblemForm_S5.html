<!DOCTYPE html><html lang="id"><head><base target="_top"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>EXPOS - Report Problem</title><style>:root{--blue:#0f3d73;--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#667085;--border:#e5eaf2;--red:#ef4444}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}button,input,select,textarea{font:inherit}.app{max-width:390px;min-height:100vh;margin:0 auto;background:var(--bg)}.top{padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 42px;background:linear-gradient(160deg,var(--blue),#092947);color:#fff;border-bottom-left-radius:28px;border-bottom-right-radius:28px;display:flex;gap:12px;align-items:flex-start}.back{width:40px;height:40px;border:0;border-radius:14px;background:rgba(255,255,255,.14);color:#fff;font-size:20px;font-weight:900}.top h1{margin:0;font-size:21px}.top p{margin:4px 0 0;font-size:12px;opacity:.82}.content{padding:0 14px 110px}.card{margin-top:-28px;background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:0 12px 30px rgba(15,61,115,.08);padding:14px}.info{display:flex;gap:11px}.ico{width:40px;height:40px;border-radius:16px;background:#fff1f2;color:var(--red);display:grid;place-items:center}.info h2{margin:0;font-size:15px}.info p{margin:5px 0 0;color:var(--muted);font-size:12px;line-height:1.4}.form{margin-top:14px;background:#fff;border:1px solid var(--border);border-radius:22px;padding:14px;box-shadow:0 12px 30px rgba(15,61,115,.08)}.field{margin-bottom:14px}label{display:block;margin-bottom:7px;font-size:12px;font-weight:800}.req{color:var(--red)}input,select,textarea{width:100%;min-height:46px;border:1px solid var(--border);border-radius:15px;background:#fbfdff;padding:12px;outline:none}textarea{min-height:112px;resize:vertical;line-height:1.45}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.action{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:390px;padding:12px 14px calc(env(safe-area-inset-bottom,0px) + 14px);background:linear-gradient(180deg,rgba(244,247,251,0),var(--bg) 28%)}.submit{width:100%;min-height:52px;border:0;border-radius:18px;background:var(--blue);color:#fff;font-weight:900}.submit:disabled{opacity:.6}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(120px);width:min(358px,calc(100% - 28px));padding:12px 14px;border-radius:16px;background:#172033;color:#fff;font-size:13px;opacity:0;transition:.22s;z-index:10}.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:340px){.row{grid-template-columns:1fr}}</style></head><body><main class="app"><header class="top"><button class="back" onclick="go('home')">‹</button><div><h1>Report Problem</h1><p>Laporkan kendala operasional cabang.</p></div></header><section class="content"><article class="card info"><div class="ico">⚠️</div><div><h2>Isi laporan dengan jelas</h2><p>Data akan diproses lewat Controller lalu Service, bukan langsung dari UI.</p></div></article><form id="form" class="form" novalidate><div class="row"><div class="field"><label>Cabang <span class="req">*</span></label><select name="branch" required><option value="">Pilih</option><option>CBN</option><option>ARH</option><option>SLW</option></select></div><div class="field"><label>Kategori <span class="req">*</span></label><select name="category" required><option value="">Pilih</option><option>Konsol</option><option>TV / Monitor</option><option>Controller</option><option>Jaringan</option><option>Fasilitas</option><option>Lainnya</option></select></div></div><div class="field"><label>Nama Pelapor <span class="req">*</span></label><input name="reportedBy" placeholder="Sesuai Master Karyawan" required></div><div class="field"><label>Judul Masalah <span class="req">*</span></label><input name="title" maxlength="90" placeholder="Contoh: Controller PS5 drifting" required></div><div class="field"><label>Prioritas</label><select name="priority"><option>Low</option><option selected>Medium</option><option>High</option></select></div><div class="field"><label>Deskripsi <span class="req">*</span></label><textarea name="description" placeholder="Jelaskan kronologi dan dampaknya." required></textarea></div></form></section><div class="action"><button id="btn" class="submit" onclick="submitForm()">Kirim Laporan</button></div></main><div id="toast" class="toast"></div><script>function go(p){location.href=location.href.split('?')[0]+'?page='+encodeURIComponent(p)}function payload(){var d=new FormData(document.getElementById('form'));return{branch:(d.get('branch')||'').trim(),category:(d.get('category')||'').trim(),reportedBy:(d.get('reportedBy')||'').trim(),title:(d.get('title')||'').trim(),priority:(d.get('priority')||'Medium').trim(),description:(d.get('description')||'').trim(),hasPhoto:false,clientTimestamp:new Date().toISOString()}}function validate(x){if(!x.branch)return'Cabang wajib dipilih.';if(!x.category)return'Kategori wajib dipilih.';if(!x.reportedBy)return'Nama pelapor wajib diisi.';if(!x.title)return'Judul wajib diisi.';if(!x.description)return'Deskripsi wajib diisi.';return''}function submitForm(){var x=payload(),e=validate(x);if(e)return toast(e);btn.disabled=true;btn.textContent='Mengirim...';google.script.run.withSuccessHandler(function(){btn.disabled=false;btn.textContent='Kirim Laporan';document.getElementById('form').reset();toast('Laporan berhasil dikirim.')}).withFailureHandler(function(err){btn.disabled=false;btn.textContent='Kirim Laporan';toast(err&&err.message?err.message:'Laporan gagal dikirim.')}).submitReportProblemFromUi(x)}function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(toast.id);toast.id=setTimeout(function(){t.classList.remove('on')},2600)}</script></body></html>
