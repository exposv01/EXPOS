<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>EXPOS - Home</title>
  <style>
    :root { --blue:#0f3d73; --blue2:#145aa0; --bg:#f4f7fb; --card:#fff; --text:#172033; --muted:#667085; --border:#e5eaf2; --green:#16a34a; --orange:#f97316; --red:#ef4444; --purple:#7c3aed; }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif} button{font:inherit}
    .app{max-width:390px;min-height:100vh;margin:0 auto;background:var(--bg)}
    .top{padding:calc(env(safe-area-inset-top,0px) + 18px) 18px 44px;background:linear-gradient(160deg,var(--blue),#092947);color:#fff;border-bottom-left-radius:28px;border-bottom-right-radius:28px}
    .top h1{margin:0;font-size:25px}.top p{margin:5px 0 0;font-size:12px;opacity:.84}.content{padding:0 14px 28px}.card{background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:0 12px 30px rgba(15,61,115,.08)}
    .hello{margin-top:-28px;padding:14px;display:flex;justify-content:space-between;gap:12px;align-items:center}.hello h2{margin:0;font-size:17px}.hello p{margin:4px 0 0;font-size:12px;color:var(--muted)}.clock{font-weight:900;color:var(--blue2);font-size:22px;white-space:nowrap}
    .happy{margin-top:14px;padding:14px;background:linear-gradient(160deg,var(--blue2),var(--blue));color:#fff;border-radius:22px}.happy h3{margin:0 0 10px;font-size:15px}.happy-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.happy-item{background:rgba(255,255,255,.12);border-radius:14px;padding:8px 4px;text-align:center}.happy-item b{display:block;font-size:18px}.happy-item span{display:block;font-size:8.5px;font-weight:800;line-height:1.15;margin-top:4px}
    .section{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 10px}.section h3{margin:0;font-size:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.menu{min-height:126px;text-align:left;border:1px solid var(--border);border-radius:16px;background:#fff;padding:12px;box-shadow:0 10px 22px rgba(15,61,115,.06);cursor:pointer}.menu .ico{width:38px;height:38px;border-radius:15px;display:grid;place-items:center;margin-bottom:10px}.menu h4{margin:0;font-size:14px}.menu p{margin:5px 0 0;color:var(--muted);font-size:11px;line-height:1.35}.red{background:#fff1f2;color:var(--red)}.green{background:#dcfce7;color:var(--green)}.orange{background:#ffedd5;color:var(--orange)}.blue{background:#dbeafe;color:var(--blue2)}.purple{background:#ede9fe;color:var(--purple)}
    .summary{padding:14px}.summary table{width:100%;border-collapse:collapse;font-size:11px}.summary th,.summary td{padding:9px 6px;border-bottom:1px solid var(--border);text-align:center}.summary th:first-child,.summary td:first-child{text-align:left;color:var(--muted);font-weight:800}.summary th{background:#f7faff;color:var(--blue);font-size:10px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(120px);width:min(358px,calc(100% - 28px));padding:12px 14px;border-radius:16px;background:#172033;color:#fff;font-size:13px;opacity:0;transition:.22s;z-index:10}.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:340px){.grid,.happy-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top"><h1>EXPOS</h1><p>Software Internal EXP Gaming</p></header>
    <section class="content">
      <article class="card hello"><div><h2 id="greeting">Selamat datang!</h2><p>Jangan lupa bahagia hari ini 😊</p><p id="dateText">-</p></div><div class="clock" id="timeText">--:--</div></article>
      <article class="happy"><h3>Budaya Kerja HAPPY</h3><div class="happy-grid"><div class="happy-item"><b>H</b><span>Happy Inside</span></div><div class="happy-item"><b>A</b><span>Always Improve</span></div><div class="happy-item"><b>P</b><span>Positive Attitude</span></div><div class="happy-item"><b>P</b><span>Play as One Team</span></div><div class="happy-item"><b>Y</b><span>Yes We Can</span></div></div></article>
      <div class="section"><h3>Menu Utama</h3></div>
      <section class="grid">
        <button class="menu" onclick="go('reportProblem')"><span class="ico red">⚠️</span><h4>Report Problem</h4><p>Laporkan masalah operasional.</p></button>
        <button class="menu" onclick="go('absensi')"><span class="ico green">✅</span><h4>Absensi</h4><p>Catat kehadiran harian.</p></button>
        <button class="menu" onclick="go('kasbon')"><span class="ico orange">💳</span><h4>Kasbon</h4><p>Ajukan kasbon karyawan.</p></button>
        <button class="menu" onclick="go('izin')"><span class="ico blue">📝</span><h4>Pengajuan Izin</h4><p>Ajukan izin secara mobile.</p></button>
        <button class="menu" onclick="go('rekapAbsensi')"><span class="ico purple">📅</span><h4>Rekap Absensi</h4><p>Lihat rekap kehadiran.</p></button>
      </section>
      <div class="section"><h3>Ringkasan Hari Ini</h3></div>
      <article class="card summary"><table><thead><tr><th>Keterangan</th><th>CBN</th><th>ARH</th><th>SLW</th></tr></thead><tbody id="summaryBody"><tr><td>Memuat...</td><td>0</td><td>0</td><td>0</td></tr></tbody></table></article>
    </section>
  </main><div id="toast" class="toast"></div>
<script>
function go(page){var base=location.href.split('?')[0]; location.href=base+'?page='+encodeURIComponent(page)}
function tick(){var n=new Date(),h=n.getHours();document.getElementById('greeting').textContent=h<11?'Selamat pagi!':h<15?'Selamat siang!':h<18?'Selamat sore!':'Selamat malam!';document.getElementById('timeText').textContent=new Intl.DateTimeFormat('id-ID',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Jakarta'}).format(n);document.getElementById('dateText').textContent=new Intl.DateTimeFormat('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:'Asia/Jakarta'}).format(n)}
function loadSummary(){if(window.google&&google.script&&google.script.run){google.script.run.withSuccessHandler(renderSummary).withFailureHandler(function(){toast('Ringkasan belum bisa dimuat')}).getHomeDashboardSummary()}else{renderSummary({hadir:{CBN:0,ARH:0,SLW:0},izin:{CBN:0,ARH:0,SLW:0},kasbon:{CBN:0,ARH:0,SLW:0},problemOpen:{CBN:0,ARH:0,SLW:0}})}}
function renderSummary(s){var rows=[['Hadir',s.hadir],['Izin',s.izin],['Kasbon',s.kasbon],['Problem Open',s.problemOpen]];document.getElementById('summaryBody').innerHTML=rows.map(function(r){var v=r[1]||{};return '<tr><td>'+r[0]+'</td><td>'+(v.CBN||0)+'</td><td>'+(v.ARH||0)+'</td><td>'+(v.SLW||0)+'</td></tr>'}).join('')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(toast.id);toast.id=setTimeout(function(){t.classList.remove('on')},2400)}
document.addEventListener('DOMContentLoaded',function(){tick();loadSummary();setInterval(tick,30000)})
</script>
</body></html>
