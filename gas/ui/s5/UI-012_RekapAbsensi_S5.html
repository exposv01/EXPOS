<!DOCTYPE html><html lang="id"><head><base target="_top"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>EXPOS - Rekap</title><style>body{margin:0;background:#f4f7fb;color:#172033;font-family:Arial,sans-serif}.app{max-width:390px;min-height:100vh;margin:0 auto}.top{background:#0f3d73;color:#fff;padding:28px 16px 38px;border-bottom-left-radius:28px;border-bottom-right-radius:28px;display:flex;gap:12px}.back{width:40px;height:40px;border:0;border-radius:14px;background:rgba(255,255,255,.15);color:#fff;font-size:22px}.card{margin:-24px 14px 14px;background:#fff;border:1px solid #e5eaf2;border-radius:22px;padding:14px;box-shadow:0 12px 30px rgba(15,61,115,.08)}.metric{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.m{background:#f7faff;border-radius:16px;padding:10px;text-align:center}.m b{display:block;font-size:21px;color:#0f3d73}.m span{font-size:10px;color:#667085;font-weight:700}label{display:block;margin:12px 0 6px;font-size:12px;font-weight:700}input,select{width:100%;box-sizing:border-box;border:1px solid #e5eaf2;border-radius:14px;padding:12px;font-size:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{width:100%;margin-top:12px;min-height:48px;border:0;border-radius:16px;background:#7c3aed;color:#fff;font-weight:900}.item{padding:11px 4px;border-bottom:1px solid #e5eaf2}.item:last-child{border-bottom:0}.item b{font-size:13px}.item p{margin:4px 0 0;color:#667085;font-size:11px}.empty{text-align:center;color:#667085;font-size:12px;line-height:1.4;padding:18px 8px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#172033;color:#fff;padding:12px;border-radius:16px;display:none;width:calc(100% - 42px);max-width:348px;font-size:13px}.toast.on{display:block}@media(max-width:340px){.row,.metric{grid-template-columns:1fr}}</style></head><body><main class="app"><header class="top"><button class="back" onclick="go('home')">‹</button><div><h1>Rekap Absensi</h1><p>Read-only summary</p></div></header><section class="card"><div class="metric"><div class="m"><b id="hadir">0</b><span>Hadir</span></div><div class="m"><b id="izin">0</b><span>Izin</span></div><div class="m"><b id="problem">0</b><span>Telat/Alpha</span></div></div><div class="row"><div><label>Cabang</label><select id="branch"><option value="ALL">Semua</option><option>CBN</option><option>ARH</option><option>SLW</option></select></div><div><label>Periode</label><input id="period" type="month"></div></div><button class="btn" onclick="load()">Tampilkan Rekap</button></section><section id="list" class="card"><div class="empty">Data belum dimuat.</div></section></main><div id="toast" class="toast"></div><script>function go(p){location.href=location.href.split('?')[0]+'?page='+encodeURIComponent(p)}function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2600)}function load(){var f={branch:branch.value,period:period.value,clientTimestamp:new Date().toISOString()};if(!f.period)return toast('Periode wajib dipilih.');google.script.run.withSuccessHandler(render).withFailureHandler(function(e){toast(e&&e.message?e.message:'Rekap gagal dimuat.')}).getAttendanceRecap(f)}function render(d){d=d||{summary:{},items:[]};hadir.textContent=d.summary.hadir||0;izin.textContent=d.summary.izin||0;problem.textContent=d.summary.telatAlpha||0;var items=d.items||[];list.innerHTML=items.length?items.map(function(x){return'<div class="item"><b>'+(x.employeeName||'-')+'</b><p>'+(x.branch||'-')+' • '+(x.date||'-')+' • '+(x.shift||'-')+'</p><p>Masuk: '+(x.checkIn||'-')+' • Pulang: '+(x.checkOut||'-')+' • '+(x.status||'-')+'</p></div>'}).join(''):'<div class="empty">Belum ada data untuk filter ini.</div>'}function init(){period.value=new Date().toISOString().slice(0,7);load()}document.addEventListener('DOMContentLoaded',init)</script></body></html>
